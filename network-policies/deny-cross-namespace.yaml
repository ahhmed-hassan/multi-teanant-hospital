# Default-deny all ingress per hospital namespace.
# Only traffic from within the same namespace is allowed.
#
# Requires a Network Policy-capable CNI to enforce:
#   - Locally: Kind + Calico (kindnet does not enforce Network Policies)
#   - AKS: Azure CNI + Azure Network Policy or Calico

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-cross-namespace
  namespace: hospital-1
spec:
  podSelector: {}       # applies to ALL Pods in this namespace. This is what pods are we protecting not what pods are we blocking
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector: {}   # allow from Pods in the same namespace only
      namespaceSelector: #By default, this matches the current namespace, but we can be explicit:
        matchLabels:
          kubernetes.io/metadata.name: hospital-1

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-cross-namespace
  namespace: hospital-2
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector: {}
      namespaceSelector: 
        matchLabels:
          kubernetes.io/metadata.name: hospital-2